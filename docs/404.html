<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>404 — ASF CLOTHING</title>
  <meta name="robots" content="noindex">
  <style>
    :root{--bg:#0f0f0f;--panel:#1e1e1e;--accent:#fff;--muted:#cfcfcf}
    html,body{height:100%;margin:0;font-family:Arial,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--accent);-webkit-font-smoothing:antialiased}
    .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
    h1{font-size:2rem;margin:0 0 12px}
    p{color:var(--muted);margin:0 0 18px}
    a.btn{display:inline-block;padding:10px 18px;background:var(--accent);color:#000;border-radius:8px;text-decoration:none;font-weight:700}
    a.secondary{color:var(--muted);font-size:0.9rem;margin-top:12px;display:inline-block}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404 — Page Not Found</h1>
    <p>Sorry, we couldn’t find the page you’re looking for.</p>
    <a class="btn" href="/ASF-CLOTHING/">Return to homepage</a>
    <div>
      <a class="secondary" href="/ASF-CLOTHING/sitemap.xml">View sitemap</a>
    </div>
    <p style="margin-top:22px;color:var(--muted)">If you typed the URL directly, please check it and try again.</p>
  </div>
</body>
</html>
